<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HelpDesk AI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>HelpDesk AI</h1>
          </div>
        </div>
        <button id="newConversation" class="primary-button">+ Nueva chat</button>
        <div class="section-title">Historial</div>
        <div id="conversationList" class="conversation-list"></div>
        <div class="agent-card">
          <div class="agent-avatar">AI</div>
          <div>
            <strong>Agente de soporte</strong>
            <span>Mesa de ayuda TI</span>
          </div>
          <button type="button" aria-label="Abrir opciones">v</button>
        </div>
      </aside>

      <section class="chat-panel">
        <header class="chat-header">
          <div class="search-shell">
            <span aria-hidden="true"></span>
            <input id="conversationSearch" type="search" placeholder="Buscar en conversaciones..." />
          </div>
          <div class="top-actions">
            <div id="statusBadge" class="status-badge">Conectando</div>
            <button type="button" class="icon-button" aria-label="Notificaciones">3</button>
            <button type="button" class="icon-button" aria-label="Ayuda">?</button>
            <div class="profile-chip">CM</div>
          </div>
        </header>

        <h2 id="conversationTitle" class="sr-only">Consulta de soporte</h2>
        <div id="messages" class="messages"></div>

        <form id="messageForm" class="composer">
          <input id="attachmentInput" type="file" accept="image/*" hidden />
          <button id="attachmentButton" class="attach-button" type="button" aria-label="Adjuntar captura">A</button>
          <div class="composer-body">
            <textarea id="messageInput" rows="1" placeholder="Escribe tu consulta aqui..." required></textarea>
            <div id="attachmentPreview" class="attachment-preview hidden"></div>
          </div>
          <button class="send-button" type="submit" aria-label="Enviar">></button>
        </form>
        <p class="disclaimer">HelpDesk AI puede cometer errores. Verifica la informacion.</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
