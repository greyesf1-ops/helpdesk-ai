name: Deploy VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      APP_DIR: ${{ secrets.APP_DIR }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

    steps:
      - name: Validate deployment secrets
        run: |
          if [ -z "$VPS_HOST" ]; then
            echo "::error title=Missing secret::Add VPS_HOST in repository secrets"
            exit 1
          fi
          if [ -z "$VPS_USER" ]; then
            echo "::error title=Missing secret::Add VPS_USER in repository secrets"
            exit 1
          fi
          if [ -z "$APP_DIR" ]; then
            echo "::error title=Missing secret::Add APP_DIR in repository secrets"
            exit 1
          fi
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error title=Missing secret::Add VPS_SSH_KEY in repository secrets"
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          script: |
            git config --global --add safe.directory "${{ env.APP_DIR }}"
            cd "${{ env.APP_DIR }}"
            git pull origin main
            sudo docker compose up -d --build
            sudo docker compose ps
