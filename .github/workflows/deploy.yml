name: Deploy VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: 18.212.132.228
      VPS_USER: ubuntu
      APP_DIR: /opt/helpdesk-ai
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

    steps:
      - name: Validate SSH key secret
        run: |
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error title=Missing secret::Add VPS_SSH_KEY in repository secrets"
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          script: |
            cd "${{ env.APP_DIR }}"
            git pull origin main
            docker compose up -d --build
            docker compose ps
